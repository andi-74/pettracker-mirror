name: Mirror Repository

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily at midnight
  workflow_dispatch:  # Allow manual runs

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Mirror Repo
      - name: Checkout PetTracker Repo
        run: |
          git clone https://github.com/Jaliborc/PetTracker.git PetTracker
          cd PetTracker
          git remote set-url --push origin https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/andi-74/pettracker-mirror.git

      # Step 2: Sync with Source Repository
      - name: Sync Changes
        run: |
          cd PetTracker
          git fetch origin --prune
          git reset --hard origin/main
          
          # Preserve `.github/workflows/mirror.yml`
          git checkout origin/main -- ':!**/.github/workflows/mirror.yml'

      # Step 3: Push to the Mirror
      - name: Push to Mirror Repo
        run: |
          cd PetTracker
          git add .
          git commit -m "Update from source repo" || echo "No changes to commit"
          git push origin main --force
